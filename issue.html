// Helper: generate slug from issue name
function makeSlug(name) {
  return name.toLowerCase()
    .replace(/[:#]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

// Dynamically load cover URLs from the tracker page's coverMap
(function loadCovers() {
  fetch('/projects/absolutetracker/')
    .then(function(r) { return r.text(); })
    .then(function(html) {
      var match = html.match(/var coverMap\s*=\s*(\{[\s\S]*?\});/);
      if (match) {
        try {
          var cm = new Function('return ' + match[1])();
          function makeSlugFromName(n) { return n.toLowerCase().replace(/[:#]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, ''); }
          Object.keys(cm).forEach(function(name) {
            var slug = makeSlugFromName(name);
            if (ISSUES[slug] && !ISSUES[slug].coverUrl) {
              ISSUES[slug].coverUrl = cm[name];
            } else if (ISSUES[slug]) {
              // Keep existing if set
            }
          });
          render(); // Re-render with covers
        } catch(e) { console.log('Cover parse error:', e); }
      }
    }).catch(function() { /* silent fail */ });
})();

function getParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}

    + retailers.map(function(r) { return '<li><a class="retailer-link" href="' + r.url + '" target="_blank" rel="noopener"><span class="retailer-name">' + r.icon + '  ' + r.name + '</span><span class="retailer-arrow">\u2192</span></a></li>'; }).join('')
    + '</ul></div>'
    + '<div class="details-card"><h3 class="section-title" style="font-size:16px">Issue Details</h3>'
    + '<div class="detail-row"><span class="detail-label">Publisher</span><span class="detail-value">DC Comics</span></div>'
    + '<div class="detail-row"><span class="detail-label">Series</span><span class="detail-value">' + issue.series + '</span></div>'
    + '<div class="detail-row"><span class="detail-label">Issue</span><span class="detail-value">' + issue.issueNum + '</span></div>'
    + '<div class="detail-row"><span class="detail-label">Release Date</span><span class="detail-value">' + issue.releaseDate + '</span></div>'
    + '<div class="detail-row"><span class="detail-label">Format</span><span class="detail-value">' + issue.format + '</span></div>'
    + '<div class="detail-row"><span class="detail-label">Pages</span><span class="detail-value">' + issue.pageCount + '</span></div>'
    + '<div class="detail-row"><span class="detail-label">Cover Price</span><span class="detail-value">' + issue.coverPrice + '</span></div>'
    + '</div>';

  var navHTML = '<div class="nav-strip">'
    + (prevIssue ? '<a class="nav-btn" href="?id=' + prevId + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' + prevIssue.name + '</a>' : '<span></span>')
    + (nextIssue ? '<a class="nav-btn" href="?id=' + nextId + '">' + nextIssue.name + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>' : '<span></span>')
    + '</div>';

  app.innerHTML = '<div class="hero">' + html + '</div>'
    + '<div class="content-area"><div class="main-content">' + mainHTML + '</div>'
    + '<div class="sidebar">' + sidebarHTML + '</div></div>'
    + navHTML;

  document.title = issue.name + ' \u2014 Absolute Universe Collection Tracker';
}

render();
window.addEventListener('popstate', render);
</script>

  <script>
  // Variant Covers Gallery - runs after page loads
  (function() {
    var slug = new URLSearchParams(window.location.search).get("id");
    if (!slug) return;

    // Derive the ownership key (series|issueNum) from the current issue
    var _issueKey = null;
    if (typeof ISSUES !== 'undefined' && ISSUES[slug]) {
      _issueKey = ISSUES[slug].series + "|" + ISSUES[slug].issueNum;
    }

    var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    function updateVariantCount(sec, vs) {
      var owned = (typeof countOwnedVariants === 'function' && _issueKey) ? countOwnedVariants(_issueKey) : 0;
      var countEl = sec.querySelector('.variant-count');
      if (countEl) {
        if (owned > 0) {
          countEl.innerHTML = '(<span class="variant-owned-count">' + owned + '</span> / ' + vs.length + ' owned)';
        } else {
          countEl.textContent = '(' + vs.length + ')';
        }
      }
    }

    fetch("variants.json?v=2").then(function(r){return r.json()}).then(function(allVariants){
      var vs = allVariants[slug];
      if (!vs || vs.length === 0) return;
      var mainContent = document.querySelector(".main-content");
      if (!mainContent) return;
      var sec = document.createElement("div");
      sec.className = "section variant-section";
      var n = 8;
      var h = "<h2 class=section-title>Variant Covers <span class=variant-count>(" + vs.length + ")</span></h2>";
      h += "<div class=variant-gallery>";
      for (var i = 0; i < vs.length; i++) {
        var d = i >= n ? " style=display:none data-xv=1" : "";
        var sn = vs[i].name.split("#").pop() || vs[i].name;
        var isOwned = (typeof isVariantOwned === 'function' && _issueKey) ? isVariantOwned(_issueKey, String(i)) : false;
        var ownedClass = isOwned ? ' v-owned' : '';
        var checkedClass = isOwned ? ' v-checked' : '';
        h += '<div class="variant-card' + ownedClass + '" data-vidx="' + i + '"' + d + '>';
        h += '<div class="variant-checkbox' + checkedClass + '" data-vidx="' + i + '">' + checkSvg + '</div>';
        h += '<img src="' + vs[i].url + '" loading=lazy onerror="this.parentElement.style.display=\'none\'">';
        h += '<div class="variant-name">' + sn + '</div>';
        if (isOwned) {
          var vpVal = (typeof getVariantPrice === 'function' && _issueKey) ? (getVariantPrice(_issueKey, String(i)) || '') : '';
          var vmVal = (typeof getVariantMarketValue === 'function' && _issueKey) ? (getVariantMarketValue(_issueKey, String(i)) || '') : '';
          h += '<div class="variant-price-row">';
          h += '<span class="variant-price-group"><span class="variant-price-label">Paid</span><input class="variant-price-input" type="number" step="0.01" min="0" placeholder="0.00" value="' + vpVal + '" data-vidx="' + i + '"></span>';
          h += '<span class="variant-price-group"><span class="variant-price-label">Value</span><input class="variant-market-input" type="number" step="0.01" min="0" placeholder="0.00" value="' + vmVal + '" data-vidx="' + i + '"></span>';
          h += '</div>';
        }
        h += '</div>';
      }
      h += "</div>";
      if (vs.length > n) h += "<div style=text-align:center;margin-top:0.75rem><button class=show-more-variants id=showMoreBtn>Show All " + vs.length + " Variants</button></div>";
      sec.innerHTML = h;
      mainContent.appendChild(sec);

      // Update owned count in header
      updateVariantCount(sec, vs);

      var btn = document.getElementById("showMoreBtn");
      if (btn) btn.onclick = function() { document.querySelectorAll("[data-xv]").forEach(function(el){el.style.display=""}); btn.parentElement.remove(); };

      // Modal for full-size view
      var modal = document.createElement("div");
      modal.className = "variant-modal";
      modal.id = "variantModal";
      var cb = document.createElement("button");
      cb.className = "variant-modal-close";
      cb.textContent = "\u00D7";
      cb.onclick = function(){ modal.classList.remove("active"); };
      var mi = document.createElement("img");
      mi.id = "variantModalImg";
      modal.appendChild(cb);
      modal.appendChild(mi);
      modal.onclick = function(e){ if(e.target===modal) modal.classList.remove("active"); };
      document.body.appendChild(modal);

      // Click handler: checkbox toggles ownership, image opens modal
      sec.onclick = function(e) {
        // Checkbox click — toggle variant ownership
        var checkbox = e.target.closest('.variant-checkbox');
        if (checkbox && _issueKey && typeof toggleVariantOwned === 'function') {
          e.stopPropagation();
          var idx = checkbox.dataset.vidx;
          toggleVariantOwned(_issueKey, idx);
          var isNowOwned = isVariantOwned(_issueKey, idx);
          checkbox.classList.toggle('v-checked', isNowOwned);
          var card = checkbox.closest('.variant-card');
          if (card) card.classList.toggle('v-owned', isNowOwned);
          updateVariantCount(sec, vs);
          // Trigger cloud sync via localStorage write
          if (typeof setOwnedVariants === 'function') {
            setOwnedVariants(getOwnedVariants());
          }
          return;
        }
        // Image click — open modal
        var c = e.target.closest('.variant-card');
        if (c) {
          var img = c.querySelector('img');
          if (img) { mi.src = img.src; modal.classList.add('active'); }
        }
      };

      // Change handler for variant price and market value inputs
      sec.addEventListener('change', function(e) {
        var marketInput = e.target.closest('.variant-market-input');
        if (marketInput && _issueKey && typeof setVariantMarketValue === 'function') {
          setVariantMarketValue(_issueKey, marketInput.dataset.vidx, marketInput.value);
        }
        var priceInput = e.target.closest('.variant-price-input');
        if (priceInput && _issueKey && typeof setVariantPrice === 'function') {
          setVariantPrice(_issueKey, priceInput.dataset.vidx, priceInput.value);
        }
      });
    }).catch(function(){});
  })();
  </script>
