name: Update Absolute Universe Data

on:
  # Run every Wednesday at 10:00 UTC (comics release on Wednesdays)
  schedule:
    - cron: '0 10 * * 3'

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # Run full Comic Vine scan
          - covers        # Full scan + fetch missing covers
          - validate      # Just validate existing data
          - sync-from-html  # Re-extract data from index.html
      add_issue:
        description: 'Add issue (format: Series|#N|Date|Writer|Artist|Price|UPC)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Add single issue (manual) ──
      - name: Add issue
        if: inputs.add_issue != ''
        run: |
          node scripts/update-issues.js --apply "--add=${{ inputs.add_issue }}"

      # ── Full pipeline (scheduled or manual) ──
      - name: Run data pipeline
        if: inputs.add_issue == '' && (inputs.mode == 'full' || inputs.mode == '' || inputs.mode == 'covers')
        env:
          COMIC_VINE_API_KEY: ${{ secrets.COMIC_VINE_API_KEY }}
        run: |
          FLAGS="--apply"
          if [ "${{ inputs.mode }}" = "covers" ]; then
            FLAGS="$FLAGS --covers"
          fi
          node scripts/update-issues.js $FLAGS

      # ── Sync from HTML ──
      - name: Sync from HTML
        if: inputs.mode == 'sync-from-html'
        run: node scripts/update-issues.js --sync-from-html --apply

      # ── Validate only ──
      - name: Validate data
        if: inputs.mode == 'validate'
        run: node scripts/update-issues.js --validate

      # ── Always validate after writes ──
      - name: Post-run validation
        if: inputs.mode != 'validate'
        run: node scripts/update-issues.js --validate

      # ── Check for changes ──
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      # ── Commit & PR ──
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Absolute Universe issue data'
          title: 'Data Update: New Absolute Universe issues'
          body: |
            Automated data pipeline found new issues or updated information.

            **Changes:**
            - Updated issue data in `data/issues.json`
            - New covers added (if available)

            Run `node scripts/update-issues.js --validate` locally to verify.

            ---
            🤖 Generated by the Absolute Universe Data Pipeline v2.0
          branch: data-update
          delete-branch: true
          labels: data-update, automated
