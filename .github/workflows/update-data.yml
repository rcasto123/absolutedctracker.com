name: Update Absolute Universe Data

on:
  # Run every Wednesday at 10:00 UTC (comics release on Wednesdays)
  schedule:
    - cron: '0 10 * * 3'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run data pipeline
        env:
          COMIC_VINE_API_KEY: ${{ secrets.COMIC_VINE_API_KEY }}
        run: node scripts/update-issues.js --apply

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Absolute Universe issue data'
          title: 'Data Update: New Absolute Universe issues'
          body: |
            Automated data pipeline found new issues or updated information.

            **Changes:**
            - Updated issue data from Comic Vine / DC.com
            - New covers added (if available)

            Please review the changes before merging.

            ---
            🤖 Generated by the Absolute Universe Data Pipeline
          branch: data-update
          delete-branch: true
          labels: data-update, automated
